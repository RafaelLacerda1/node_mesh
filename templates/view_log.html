<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log de {{ username }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css' ) }}">
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container mx-auto p-4 md:p-8">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-4">
            Log de Auditoria: <span class="font-mono bg-gray-200 px-2 py-1 rounded">{{ username }}</span>
        </h1>
        <a href="{{ url_for('admin.dashboard') }}" class="mb-6 inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
            &larr; Voltar ao Painel Admin
        </a>
        
        <div class="log-area" style="max-height: 80vh;">
            <pre class="text-sm">{{ log_content }}</pre>
        </div>
    </div>
</body>
</html>
