<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetar Senha - Monitor de Nós</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css' ) }}">
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-lg shadow-md">
            
            <a href="{{ url_for('admin.dashboard') }}" class="text-sm text-blue-600 hover:text-blue-800">&larr; Voltar ao Admin</a>

            <h1 class="text-2xl font-bold text-gray-900">
                Resetar Senha
            </h1>
            <p class="text-gray-700">
                Você está definindo uma nova senha para o usuário: <strong class="font-mono bg-gray-200 px-2 py-1 rounded">{{ user.username }}</strong>
            </p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="bg-{{ 'red' if category == 'danger' else 'yellow' }}-100 border border-{{ 'red' if category == 'danger' else 'yellow' }}-400 text-{{ 'red' if category == 'danger' else 'yellow' }}-700 px-4 py-3 rounded-lg" role="alert">
                            <span class="block sm:inline">{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('admin.reset_password', user_id=user.id) }}" class="space-y-6">
                <div>
                    <label for="new_password" class="block text-sm font-medium text-gray-700">Nova Senha</label>
                    <input type="password" id="new_password" name="new_password" required 
                           class="mt-1 block w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-all duration-200 ease-in-out">
                        Definir Nova Senha e Sincronizar
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
