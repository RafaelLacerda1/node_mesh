<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Nós (1–20)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#475569',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css' ) }}">
    <style>
        .modal-z-index { z-index: 9999; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans" 
      data-username="{{ current_user.username }}" 
      data-is-admin="{{ current_user.is_admin|string|lower }}">

    <div class="container mx-auto p-4 md:p-6 max-w-7xl">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <div class="mb-4 md:mb-0">
                <h1 class="text-2xl font-bold text-slate-900">Monitor de Nós (1–20)</h1>
                <div class="flex items-center gap-2 mt-1">
                    <div id="last-updated" class="text-xs font-mono text-slate-500 bg-slate-100 px-2 py-1 rounded">
                        Aguardando atualização...
                    </div>
                    <span class="text-sm text-slate-600">| Logado como: <strong>{{ current_user.username }}</strong></span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                {% if current_user.is_admin %}
                <a href="{{ url_for('admin.dashboard') }}" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 rounded-lg transition-all shadow-sm text-sm">⚙️ Admin</a>
                {% endif %}
                <button id="refresh-btn" class="bg-primary hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-all shadow-sm flex items-center text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg id="refresh-icon" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h5M20 20v-5h-5M20 4h-5v5M4 20h5v-5" />
                    </svg>
                    <span id="refresh-btn-text">Reverificar</span>
                </button>
                <a href="{{ url_for('auth.logout') }}" class="bg-slate-600 hover:bg-slate-700 text-white font-bold py-2 px-4 rounded-lg transition-all shadow-sm text-sm">Sair</a>
            </div>
        </header>
        
        <main>
            <div id="error-banner" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded shadow-sm mb-6" role="alert">
                <div class="flex items-center">
                    <svg class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <div><strong class="font-bold">Erro:</strong> <span class="block sm:inline" id="error-message"></span></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
                <h2 class="text-lg font-semibold mb-4 text-slate-800 border-b pb-2">Painel de Controle</h2>
                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <div class="flex-grow relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </span>
                        <input type="text" id="command-input" placeholder="Digite um comando shell (ex: uptime, free -m)" class="w-full pl-10 p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-slate-50 text-sm">
                    </div>
                    <button id="send-command-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-6 rounded-lg transition-colors shadow-sm text-sm disabled:opacity-50 whitespace-nowrap">Enviar Comando</button>
                </div>
                <div class="flex items-center mb-4 px-1">
                    <input type="checkbox" id="select-all-nodes" class="w-5 h-5 text-primary border-gray-300 rounded focus:ring-primary cursor-pointer">
                    <label for="select-all-nodes" class="ml-2 text-sm font-medium text-slate-700 cursor-pointer select-none">Selecionar Todos</label>
                </div>
                <div id="nodes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full"></div>
            </div>

            <div class="bg-slate-900 rounded-xl shadow-lg overflow-hidden border border-slate-700">
                <div class="bg-slate-800 px-4 py-2 border-b border-slate-700 flex justify-between items-center">
                    <h3 class="text-sm font-mono text-slate-300 font-bold">Terminal Output / Logs</h3>
                    <button onclick="document.getElementById('log-area').innerHTML=''" class="text-xs text-slate-400 hover:text-white hover:underline">Limpar</button>
                </div>
                <div id="log-area" class="p-4 font-mono text-xs md:text-sm text-green-400 h-64 overflow-y-auto whitespace-pre-wrap scrollbar-thin scrollbar-thumb-slate-600 scrollbar-track-slate-800">
                    <span class="text-slate-500">// Aguardando execução...</span>
                </div>
            </div>
        </main>
    </div>

    <div id="password-modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden modal-z-index">
        <div id="password-modal" class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm transform transition-all scale-100" data-node-ip="">
            <div class="text-center mb-4"><h3 class="text-lg font-bold text-slate-800">Autenticação Necessária</h3></div>
            <p id="password-modal-text" class="text-slate-600 text-sm mb-4 text-center">Digite sua senha:</p>
            <input type="password" id="password-modal-input" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 mb-4 outline-none text-center" placeholder="••••••">
            <div class="flex gap-3">
                <button id="password-modal-cancel" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 font-semibold py-2 px-4 rounded-lg">Cancelar</button>
                <button id="password-modal-ok" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="terminal-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center hidden modal-z-index">
        <div class="bg-black w-[95%] h-[90%] rounded-lg shadow-2xl flex flex-col overflow-hidden border border-slate-700">
            <div class="flex justify-between items-center bg-slate-800 px-4 py-2 border-b border-slate-700">
                <div class="flex items-center gap-2"><span class="text-slate-200 font-mono font-bold text-sm">WebSSH Terminal</span></div>
                <button id="close-terminal-btn" class="text-slate-400 hover:text-white hover:bg-red-600/80 rounded p-1 transition-all" title="Fechar Conexão">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex-grow bg-black relative">
                <iframe id="terminal-iframe" class="absolute inset-0 w-full h-full border-none" src=""></iframe>
            </div>
        </div>
    </div>
    
    <script>
        const WEBSSH_URL_BASE = "{{ webssh_url or '' }}";
        const SESSION_TIMEOUT_MS = {{ config.get('PERMANENT_SESSION_LIFETIME').total_seconds() * 1000 if config.get('PERMANENT_SESSION_LIFETIME') else 900000 }};
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
